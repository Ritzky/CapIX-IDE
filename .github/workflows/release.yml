name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Capix IDE ${{ github.ref_name }}
          body: |
            ## Capix IDE ${{ github.ref_name }}

            The AI IDE for the Capix protocol — a VS Code fork with built-in LLM deploys, cloud panels, SSH terminal, Covenant memory, and seamless profile sync.

            ### Install

            Download the appropriate file for your platform below.

            | Platform | File |
            |---|---|
            | macOS (Apple Silicon) | `.dmg` (arm64) |
            | macOS (Intel) | `.dmg` (x64) |
            | Windows | `.exe` (x64) |
            | Linux | `.AppImage` / `.deb` / `.rpm` |

            ### Building from source

            ```bash
            git clone https://github.com/Ritzky/CapIX-IDE.git
            cd CapixIDE
            ./scripts/bootstrap.sh
            ./scripts/dev.sh
            ```
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.os }}-${{ matrix.arch }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-latest
            platform: darwin
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64
          - os: windows-latest
            platform: win32
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: arm64

    steps:
      - name: Checkout CapixIDE repo (rebrand kit)
        uses: actions/checkout@v4

      - name: Setup Node 20.18.2
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.2"

      - name: Clone + rebrand Void source
        run: ./scripts/bootstrap.sh
        shell: bash

      - name: Install native deps (linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential g++ libx11-dev libxkbfile-dev libsecret-1-dev libkrb5-dev python-is-python3

      - name: Install npm deps
        run: npm install
        working-directory: vscode

      - name: Build CapixIDE
        run: ./scripts/build.sh
        env:
          VSCODE_ARCH: ${{ matrix.arch }}
        shell: bash

      - name: Package installer (electron-builder)
        run: npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --config ../electron-builder.yml --publish always
        working-directory: vscode
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CapixIDE-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/CapixIDE-*
